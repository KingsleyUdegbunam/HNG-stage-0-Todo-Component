<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="styles.css">
  <title>Todo Card</title>
</head>

<body>
  <div class="main-wrapper">
    <article class="todo-card" data-testid="test-todo-card">
      <div class="todo-header">
        <span class="priority" data-testid="test-todo-priority">Medium</span>

        <h2 class="todo-title" data-testid="test-todo-title">Complete Stage 0 Task</h2>
        <p class="todo-desc" data-testid="test-todo-description">Build a clean, modern Todo Item Card.</p>
      </div>

      <div class="todo-meta">
        <div class="date-time-status">
          <div class="time-status">
            <time class="due-date" data-testid="test-todo-due-date" datetime="2026-04-16T23:59:00Z">Due April 16,
              2026
            </time>
            <time aria-live="polite" class="remaining-time" data-testid="test-todo-time-remaining"></time>
          </div>
          <span class="todo-status" data-testid="test-todo-status">In Progress</span>
        </div>

        <ul role="list" class="todo-tags" data-testid="test-todo-tags">
          <li data-testid="test-todo-tag-urgent">Urgent</li>
          <li data-testid="test-todo-tag-work">Work</li>
          <li data-testid="test-todo-tag-hng">HNG</li>
        </ul>
      </div>

      <div class="todo-footer">
        <label title="Mark as complete">
          <input type="checkbox" id="checkbox" data-testid="test-todo-complete-toggle">
          <span class="toggle-text">Mark as Completed</span>
        </label>

        <div class="buttons">
          <button class="edit-todo" data-testid="test-todo-edit-button" title="Edit this item">Edit</button>
          <button class="delete-todo" data-testid="test-todo-delete-button" title="Delete this item">Delete</button>
        </div>

      </div>
    </article>

    <form data-testid="test-todo-edit-form" class="edit-container">
      <div class="edit-text-container">
        <div class="edit-title">
          <label for="edit-title">Title</label>
          <input data-testid="test-todo-edit-title-input" type="text" name="edit-title" id="edit-title">
        </div>

        <div class="edit-desc">
          <label for="edit-desc">Description</label>
          <textarea data-testid="test-todo-edit-description-input" name="edit-desc" id="edit-desc"></textarea>
        </div>
      </div>

      <fieldset class="priority-n-date">
        <legend>Priority & Due Date</legend>
        <div class="fieldset-wrapper">
          <div class="edit-priority-container">
            <label for="edit-priority">
              Priority
            </label>
            <select data-testid="test-todo-edit-priority-select" name="edit-priority" id="edit-priority">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="edit-due-date-container">
            <label for="edit-due-date">
              Due date
            </label>
            <input data-testid="test-todo-edit-due-date-input" type="datetime-local" name="edit-due-date"
              id="edit-due-date">
          </div>
        </div>
      </fieldset>
      <div class="edit-buttons-container">
        <button type="button" class="edit-btn edit-btn--cancel" data-testid="test-todo-cancel-button"
          title="Cancel changes">Cancel</button>
        <button type="submit" class="edit-btn edit-btn--save" data-testid="test-todo-save-button"
          title="Save changes">Save</button>
      </div>
    </form>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
